  <style>
    @keyframes scanline-flicker {
      0% { opacity: 0.8; }
      100% { opacity: 1; }
    }

    @keyframes logo-drift {
      from { transform: translateY(0) rotate(-1deg); }
      to { transform: translateY(15px) rotate(1deg); }
    }

    @keyframes glitch-in {
      0%   { opacity: 0; }
      10%  { opacity: 0.9; }
      15%  { opacity: 0; }
      25%  { opacity: 0.7; }
      30%  { opacity: 0; }
      45%  { opacity: 1; }
      50%  { opacity: 0.1; }
      60%  { opacity: 0.8; }
      65%  { opacity: 0; }
      75%  { opacity: 1; }
      80%  { opacity: 0.3; }
      90%  { opacity: 1; }
      100% { opacity: 1; }
    }

    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #a03f99;
      overflow: hidden;
    }

    body.complete div {
      animation: glitch-in 1.5s steps(1) forwards;
    }

    body.complete main::before {
      opacity: 1;
    }

    main {
      position: relative;
      display: flex;
      width: 100vw;
      height: 100vh;
      justify-content: center;
      align-items: center;
    }

    main::before {
      position: absolute;
      content: "";
      inset: 0;
      z-index: 8;
      pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 30%, #a03f99 90%);
      opacity: 0;
      transition: opacity 2s ease;
    }

    main::after {
      position: absolute;
      content: "";
      inset: 0;
      z-index: 5;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent 0px,
        transparent 2px,
        rgba(0, 0, 0, 0.15) 2px,
        rgba(0, 0, 0, 0.15) 4px
      );
      animation: scanline-flicker 0.1s steps(2) infinite;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(1.2) contrast(1.1) saturate(1.2);
    }

    img {
      position: absolute;
      top: 8vh;
      left: 0;
      right: 0;
      width: 100%;
      height: 30vh;
      min-height: 150px;
      object-fit: contain;
      image-rendering: pixelated;
      filter: url(#neon-glow);
      mix-blend-mode: screen;
      z-index: 10;
      will-change: filter;
      animation: logo-drift 8s ease-in-out infinite alternate;
    }

    div {
      position: absolute;
      inset: 0;
      background: #a03f99;
      opacity: 0;
      z-index: 3;
      pointer-events: none;
    }

    p {
      position: absolute;
      inset: 0;
      z-index: 6;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 2rem 2rem 30vh;
      font-family: 'VT323', monospace;
      font-size: clamp(1.4rem, 4vw, 3rem);
      color: #f3e9ff;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      text-shadow: 0 0 2px #fff, 0 0 15px rgba(233, 176, 255, 0.95);
      transition: opacity 0.3s;
    }

    p:not(:empty) {
      opacity: 1;
    }

    @media (orientation: portrait) {
      video {
        object-position: 70% center;
      }
    }
  </style>
</head>
<body>

<main>
  <video autoplay muted playsinline>
    <source src="video.mp4" type="video/mp4"/>
  </video>
  <div></div>
  <p></p>
  <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAA9QAAAFQAQMAAABkpKQgAAAABGdBTUEAALGPC/xhBQAAAAFzUkdCAK7OHOkAAAAGUExURQAAAOvr64qCl1kAAAQhSURBVHja7d1BlqIwEAZg2MAt4GoeI6uG2UzfYs7GMVjNDLSPpyEUqSpU/pDChd12/v58CkVK5FEUh5bu37z0xRnLmXaeSzlcxS6H5/8X+9/L37fHSZ+Z2Z+3ZUt9YlF5r32vmWHd5NVSKo1v22L7qfDxd9QWfLvu87T9/U8+duEua1fTTb+NrdIJ2c1009urdEK2m256e5XGsctlajOsZjuDXz3CcV5elT7VHvZfy7q/z4b3x+nSSPb6ftlIeLYsjWwvG8n+uL30vL6lZ9+mm96e02nYS29LbTX765osjWH7va3U1qQxbF7vI6upZqPZ3NG82hJLy/rqz9uP3lZj02l0O6z+EptOo9uP3la1rjl8O1ZbXruNyeqa2a+3rZ4T6VX3KrSJzhnf5r0H3DSOrZ0z6ezXzNfMft889arreb72vXv9FU374/zemZvugWxb18w2m9cTc9Op2bGemJtOzY71xNw0rq3rDblps9HsbPox6tjysD9umQXp0gD2oZ7o2Cf/SLZsG9Om8W1dTdF9rnimLXtO2jS+ncv2bbbZZl/NDrvU7d/XvbA2jWLHjxpvj9OmUez4UePtcdo0jK24n386a75m9rvsXPsSs60PtdqiS6Vgv3pdQ7Xz7Q32j0k/33fBEWluGtG2XjBHO1Z79i06zaktZpv9GXs5c0tn76Wx7ceptBG7kqax7a/pxrIbaRrbbvu2Z9lOmoazvaPE9VDLuhp2Gs725wRjOXLsupemse3HZrJvN4U0DW4366pB1V5pGtyu1nsJal8rTYPbyjlTPJ26vX3O9fXtXN/vq9q5fZ/JbLPNtuNE+dq2jZltdc3sd8wVz7T1zzhH22qL2WafZ8se16bNRrd5+1Bu2mwU2+Zredm2jZltdc1qi9W1a29j+c6Ru58jzlrbT6dkW090ZZtaHuP2agudlnwfGdG+n099PTt+LRnJvsTsBO3q+femENpVsnbDry10OkHbHbIdqr3+FuD67Lv11WF8m5vGs2Ovmn81L+lrvqRRbbqLaRhzh3g6Pdsdsl2y9u2QfQO3Y9fW3rfjaVQ7vMZ2511LO1ZbYmlc2/qxK9ufXlDspRqEVcF/JBw3/yRPo9hUNSwH/5Fw3PO6xk+j2MvpZ3T6Ro1zmjSM7c3lntON/+SIcdI0mk3XgK9DFeRLUdcw7LY/Yrc9qv2Y5XTBWXjzI9/D1rhlpDSNY0fnCOOR13ydTsfWbGR0GtWmPpWTmXQ6Ibs6ZFdp2LnMz8MlvFpXR169S57GtXN9v82+9kL3sZxx4vSIYks/zYz1xnS6nMY0DYpN9bHBsj1OkP4Z42Bs4dSoKbTp2d6uLWfa71+6sf1T/87Prnvn2r84NndOtD2On/6ebH369fYnX3OzM7L/5GmXYzvmaFMzh+vbLlO7HQDs/zI4KD1stZrzAAAAAElFTkSuQmCC" alt=""/>
</main>

<svg style="position: absolute; width: 0; height: 0;">
  <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
    <feColorMatrix in="SourceGraphic" type="luminanceToAlpha" result="mask"/>
    <feFlood flood-color="#FFFFFF" result="white-color"/>
    <feComposite in="white-color" in2="mask" operator="in" result="white-pixels"/>
    <feComponentTransfer in="white-pixels" result="white-boosted">
      <feFuncR type="linear" slope="2"/>
      <feFuncG type="linear" slope="2"/>
      <feFuncB type="linear" slope="2"/>
    </feComponentTransfer>
    <feFlood flood-color="#FF00FF" result="magenta-color"/>
    <feComposite in="magenta-color" in2="mask" operator="in" result="magenta-pixels"/>
    <feGaussianBlur in="magenta-pixels" stdDeviation="4"  result="blur1"/>
    <feGaussianBlur in="magenta-pixels" stdDeviation="15" result="blur2"/>
    <feGaussianBlur in="magenta-pixels" stdDeviation="35" result="blur3"/>
    <feBlend in="blur1" in2="blur2" mode="screen" result="glow1"/>
    <feBlend in="glow1" in2="blur3" mode="screen" result="glow-blended"/>
    <feComponentTransfer in="glow-blended" result="glow-final">
      <feFuncA type="linear" slope="3"/>
    </feComponentTransfer>
    <feMerge>
      <feMergeNode in="glow-final"/>
      <feMergeNode in="white-boosted"/>
    </feMerge>
  </filter>
</svg>
<script>
  const body = document.querySelector('body');
  const video = document.querySelector('video');
  const tagline = document.querySelector('p');

  const quotes = [
    "where the ethe(real) work gets done",
    "shipping vibes to prod since the before times",
    "null island, full presence",
    "undefined behavior, intentional aesthetic",
    "404: work-life balance not found",
    "async by nature, synced by choice",
    "this is fine. the glow is decorative.",
    "git push origin feelings",
    "the latency is part of the vibe",
    "deploying consciousness to the void",
    "infinite scroll, finite attention",
    "in production we trust",
    "the bug is a feature now",
    "on the bleeding edge of standing still",
    "eventually consistent, perpetually confused",
    "side effects may include clarity",
    "the stack is immaculate. the soul is not.",
    "works on my machine",
    "rendering the ineffable since always",
    "garbage collected, heart intact",
    "strongly typed, loosely held",
    "hot reload. cold takes.",
    "the semicolon is always silent",
    "you are now leaving the main thread",
    "everything is a service if you're brave enough",
    "branch: main. mood: detached.",
    "the dark mode was within us all along",
    "make code not war",
  ];

  function streamText(quote) {
    tagline.textContent = '';
    let i = 0;
    const interval = setInterval(() => {
      tagline.textContent = quote.slice(0, ++i);
      if (i >= quote.length) clearInterval(interval);
    }, 55);
  }

  video.addEventListener('timeupdate', () => {
    if (!body.classList.contains('complete') && video.duration - video.currentTime <= 2.5) {
      body.classList.add('complete');
      const quote = quotes[Math.floor(Math.random() * quotes.length)];
      setTimeout(() => streamText(quote), 1700);
    }
  });
</script>
