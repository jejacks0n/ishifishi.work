<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>:: ishifishi ::</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

  <meta name="description" content="ishifishi.work :: where the ethe(real) work gets done">

  <meta property="og:type" content="website">
  <meta property="og:url" content="https://ishifishi.work">
  <meta property="og:title" content=":: ishifishi ::">
  <meta property="og:description" content="ishifishi.work :: where the ethe(real) work gets done">
  <meta property="og:image" content="https://ishifishi.work/og-image.png">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:url" content="https://ishifishi.work">
  <meta name="twitter:title" content=":: ishifishi ::">
  <meta name="twitter:description" content="ishifishi.work :: where the ethe(real) work gets done">
  <meta name="twitter:image" content="https://ishifishi.work/og-image.png">
  <style>
    @keyframes scanline-flicker {
      0% { opacity: 0.8; }
      100% { opacity: 1; }
    }

    @keyframes logo-drift {
      from { transform: translateY(0) rotate(-1deg); }
      to { transform: translateY(15px) rotate(1deg); }
    }

    @keyframes glitch-in {
      0%   { opacity: 0; }
      10%  { opacity: 0.9; }
      15%  { opacity: 0; }
      25%  { opacity: 0.7; }
      30%  { opacity: 0; }
      45%  { opacity: 1; }
      50%  { opacity: 0.1; }
      60%  { opacity: 0.8; }
      65%  { opacity: 0; }
      75%  { opacity: 1; }
      80%  { opacity: 0.3; }
      90%  { opacity: 1; }
      100% { opacity: 1; }
    }

    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #a434bd;
      overflow: hidden;
    }

    main {
      position: relative;
      display: flex;
      width: 100vw;
      height: 100vh;
      justify-content: center;
      align-items: center;
    }

    main::after {
      position: absolute;
      content: "";
      inset: 0;
      z-index: 5;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent 0px,
        transparent 2px,
        rgba(0, 0, 0, 0.15) 2px,
        rgba(0, 0, 0, 0.15) 4px
      );
      animation: scanline-flicker 0.1s steps(2) infinite;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(1.2) contrast(1.1) saturate(1.2);
    }

    img {
      position: absolute;
      top: 8vh;
      left: 0;
      right: 0;
      width: 100%;
      height: 30vh;
      min-height: 150px;
      object-fit: contain;
      image-rendering: pixelated;
      filter: url(#neon-glow);
      mix-blend-mode: screen;
      z-index: 10;
      will-change: filter;
      animation: logo-drift 8s ease-in-out infinite alternate;
    }

    div {
      position: absolute;
      inset: 0;
      background: #a434bd;
      opacity: 0;
      z-index: 3;
      pointer-events: none;
    }

    div.active {
      animation: glitch-in 1.5s steps(1) forwards;
    }

    p {
      position: absolute;
      inset: 0;
      z-index: 6;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 2rem 2rem 30vh;
      font-family: 'VT323', monospace;
      font-size: clamp(1.4rem, 4vw, 3rem);
      color: #f3e9ff;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      text-shadow: 0 0 3px rgba(216, 98, 255, 0.95), 0 0 10px rgba(233, 176, 255, 0.95);
      transition: opacity 0.6s;
    }

    p:not(:empty) {
      opacity: 1;
    }
  </style>
</head>
<body>

<main>
  <video id="whaleVideo" autoplay muted playsinline>
    <source src="video.mp4" type="video/mp4"/>
  </video>
  <div></div>
  <p></p>
  <img src="logo.png" alt=""/>
</main>

<svg style="position: absolute; width: 0; height: 0;">
  <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
    <feColorMatrix in="SourceGraphic" type="luminanceToAlpha" result="mask"/>
    <feFlood flood-color="#FFFFFF" result="white-color"/>
    <feComposite in="white-color" in2="mask" operator="in" result="white-pixels"/>
    <feComponentTransfer in="white-pixels" result="white-boosted">
      <feFuncR type="linear" slope="2"/>
      <feFuncG type="linear" slope="2"/>
      <feFuncB type="linear" slope="2"/>
    </feComponentTransfer>
    <feFlood flood-color="#FF00FF" result="magenta-color"/>
    <feComposite in="magenta-color" in2="mask" operator="in" result="magenta-pixels"/>
    <feGaussianBlur in="magenta-pixels" stdDeviation="4"  result="blur1"/>
    <feGaussianBlur in="magenta-pixels" stdDeviation="15" result="blur2"/>
    <feGaussianBlur in="magenta-pixels" stdDeviation="35" result="blur3"/>
    <feBlend in="blur1" in2="blur2" mode="screen" result="glow1"/>
    <feBlend in="glow1" in2="blur3" mode="screen" result="glow-blended"/>
    <feComponentTransfer in="glow-blended" result="glow-final">
      <feFuncA type="linear" slope="3"/>
    </feComponentTransfer>
    <feMerge>
      <feMergeNode in="glow-final"/>
      <feMergeNode in="white-boosted"/>
    </feMerge>
  </filter>
</svg>
<script>
  const video = document.querySelector('video');
  const overlay = document.querySelector('div');
  const tagline = document.querySelector('p');

  const quotes = [
    "where the ethe(real) work gets done",
    "shipping vibes to prod since the before times",
    "null island, full presence",
    "undefined behavior, intentional aesthetic",
    "404: work-life balance not found",
    "async by nature, synced by choice",
    "this is fine. the glow is decorative.",
    "git push origin feelings",
    "the latency is part of the vibe",
    "deploying consciousness to the void",
    "infinite scroll, finite attention",
    "in production we trust",
    "the bug is a feature now",
    "on the bleeding edge of standing still",
    "eventually consistent, perpetually confused",
    "side effects may include clarity",
    "the stack is immaculate. the soul is not.",
    "works on my machine",
    "rendering the ineffable since always",
    "garbage collected, heart intact",
    "strongly typed, loosely held",
    "hot reload. cold takes.",
    "the semicolon is always silent",
    "you are now leaving the main thread",
    "everything is a service if you're brave enough",
    "branch: main. mood: detached.",
    "the dark mode was within us all along",
    "make code not war",
  ];

  function streamText(quote) {
    tagline.textContent = '';
    let i = 0;
    const interval = setInterval(() => {
      tagline.textContent = quote.slice(0, ++i);
      if (i >= quote.length) clearInterval(interval);
    }, 55);
  }

  video.addEventListener('timeupdate', () => {
    if (!overlay.classList.contains('active') && video.duration - video.currentTime <= 1.5) {
      overlay.classList.add('active');
      const quote = quotes[Math.floor(Math.random() * quotes.length)];
      setTimeout(() => streamText(quote), 1700);
    }
  });
</script>
</body>
</html>
